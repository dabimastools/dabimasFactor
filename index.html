<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- 端末のダークモード設定を無視して常にライト表示にする -->
    <meta name="color-scheme" content="light only" />
    <title>ダビふぁく</title>
    <link rel="manifest" href="./manifest.json" />
    <link href="./css/loading.css" type="text/css" rel="stylesheet" />
    <link href="./css/style.css" type="text/css" rel="stylesheet" />
    <link href="./css/factor-dialog.css" type="text/css" rel="stylesheet" />
    <link href="./css/combinationDialog.css" type="text/css" rel="stylesheet" />

    <!-- <link
      href="https://cdn.jsdelivr.net/npm/@mdi/font@5.x/css/materialdesignicons.min.css"
      rel="stylesheet"
    /> -->
    <link
      href="./css/materialdesignicons.min.css"
      type="text/css"
      rel="stylesheet"
    />
    <link
      href="./css/vuetify_compact.min.css"
      type="text/css"
      rel="stylesheet"
    />
    <link href="./css/mobile.css" type="text/css" rel="stylesheet" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <!-- 32×32 -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <!-- 180×180 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no"
    />
  </head>

  <body>
    <!-- ローディングアニメーション↓ -->
    <div id="loader">
      <div class="spinner">
        <div class="cube1"></div>
        <div class="cube2"></div>
      </div>
    </div>
    <!-- ローディングアニメーション↑ -->

    <!-- 非同期処理が完了した後に表示するコンテンツ -->
    <v-app id="app" :class="{ 'exp-mobile-layout': isCompactMobileLayout }">
      <header ref="appHeader">
        <factor-summary-header
          :factor-nums="factorNumtoString"
          :inbreed-factor-nums="inbreedFactorNumtoString"
          :category-num="categoryNumtoString"
          :theory-class="styleThoeryClass"
          :disp-category="dispCategory"
          :combination-cell-style="combinationCellStyle"
          :is-capturing-screenshot="isCapturingScreenshot"
          @toggle-category="handleClick"
          @combination-open="handleCombinationCellClick"
          @reset="initializer"
          @capture-screenshot="captureMobileScreenshot"
        ></factor-summary-header>
      </header>

      <!-- 配合保存ダイアログ -->
      <combination-dialog
        v-model="combinationDialogVisible"
        :all-horses-set="allHorsesSet"
        @restore="onCombinationRestore"
      ></combination-dialog>

      <!-- detail（血統）取得失敗時の再試行メッセージ -->
      <v-snackbar
        v-model="horseDetailError.show"
        :timeout="4000"
        color="error"
        top
      >
        {{ horseDetailError.message }}
        <template v-slot:action="{ attrs }">
          <v-btn text v-bind="attrs" @click="horseDetailError.show = false">
            閉じる
          </v-btn>
        </template>
      </v-snackbar>


      <main ref="appMain">
        <v-container fluid>
          <v-spacer class="my-1 px-0 mx-0 my-0" />
          <v-row class="mx-1" align-content="center">
            <!-- <v-spacer class="my-1 px-0 mx-0 my-0" /> -->
            <!-- xsを設定できないので↓のようなカンジで -->
            <pedigree-card
              side="stallion"
              :rows="rowConfigs"
              :row-states="stallionRowStates"
              :horse-options="horseSelectionOptions"
              :display-options="rowDisplayOptions"
              @inbreed-toggle="onRowInbreedToggle"
              @manual-factor-update="onRowManualFactorUpdate"
              @toggle-category="handleClick"
            ></pedigree-card>
            <!-- xsを設定できないので↓のようなカンジで -->
            <pedigree-card
              side="broodmare"
              :rows="rowConfigsBloodmare"
              :row-states="broodmareRowStates"
              :horse-options="horseSelectionOptions"
              :display-options="rowDisplayOptions"
              @inbreed-toggle="onRowInbreedToggle"
              @manual-factor-update="onRowManualFactorUpdate"
              @toggle-category="handleClick"
            ></pedigree-card>
          </v-row>
        </v-container>
      </main>
    </v-app>
  </body>

  <script src="./vue/vue.min.js"></script>
  <script src="./vue/logic/storage/combination-storage.js"></script>
  <script src="./vue/CombinationDialog.js"></script>
  <script src="./vue/vuetify.js"></script>
  <script src="./vue/factor-dialog.js"></script>

  <script src="./vue/constants/pedigree-indexes.js"></script>
  <script src="./vue/constants/parent-lines.js"></script>
  <script src="./vue/constants/factor-definitions.js"></script>
  <script src="./vue/logic/pedigree/pedigree-css.js"></script>
  <script src="./vue/logic/factor/factor-map.js"></script>
  <script src="./vue/logic/factor/factor-counts.js"></script>
  <script src="./vue/logic/factor/manual-factors.js"></script>
  <script src="./vue/logic/pedigree/row-configs.js"></script>
  <script src="./vue/logic/pedigree/pedigree-selection.js"></script>
  <script src="./vue/logic/horses/horse-search.js"></script>
  <script src="./vue/logic/storage/local-storage.js"></script>
  <script src="./vue/logic/theory/compatibility.js"></script>
  <script src="./vue/logic/pedigree/pedigree-builder.js"></script>
  <script src="./vue/logic/inbreed/inbreed-exceptions.js"></script>
  <script src="./vue/logic/inbreed/inbreed-detector.js"></script>
  <script src="./vue/logic/inbreed/inbreed-counts.js"></script>
  <script src="./vue/components/pedigree/memo-cell.js"></script>
  <script src="./vue/components/pedigree/desktop-horse-autocomplete.js"></script>
  <script src="./vue/components/pedigree/mobile-horse-picker.js"></script>
  <script src="./vue/components/pedigree/horse-cell.js"></script>
  <script src="./vue/components/pedigree/pedigree-row.js"></script>
  <script src="./vue/components/pedigree/pedigree-table.js"></script>
  <script src="./vue/components/pedigree/pedigree-card.js"></script>
  <script src="./vue/components/header/factor-summary-header.js"></script>

  <script src="./vue/app/app-state.js"></script>
  <script src="./vue/app/app-computed.js"></script>
  <script src="./vue/app/app-lifecycle.js"></script>
  <script src="./vue/app/methods/ui-viewport.js"></script>
  <script src="./vue/app/methods/combination.js"></script>
  <script src="./vue/app/methods/horse-loading.js"></script>
  <script src="./vue/app/methods/bootstrap.js"></script>
  <script src="./vue/app/methods/selection.js"></script>
  <script src="./vue/app/methods/inbreed-ui.js"></script>
  <script src="./vue/app/methods/pedigree-cells.js"></script>
  <script src="./vue/app/app-options.js"></script>

  <script src="./vue/app/boot.js"></script>
  <script src="./vue/app/main.js"></script>
</html>
<!--
【最適化のまとめ】
このファイルは元のindex.htmlから以下の最適化を行っています：

1. 繰り返し計算のキャッシュ化
   - cell_id + sex * 16 → cellIndex, sexOffset として事前計算
   - factorCd[index]、factors 配列などの事前取得

2. 配列検索の最適化
   - cell_id_que.indexOf(cell_id) の重複呼び出しを排除
   - ループインデックスを直接使用

3. 不要な配列コピーの削減
   - Array.from() の不要な使用を削除
   - スプレッド演算子の代わりに push() を使用
   - 空配列の再利用

4. ループの最適化
   - for...of → for (let i = 0; ...) でインデックス直接利用
   - map → forEach（戻り値不要の場合）
   - while ループ内の indexOf 最適化

これらの最適化により、処理速度が30-50%程度向上すると期待されます。
特にsetPedigree関数、restoreInputData関数、getCellIdQue関数で大きな効果があります。
-->
